<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass UI</title>

<script>
/* =========================
   🔧 CONFIG (EDIT HERE ONLY)
   ========================= */
const CONFIG = {
  name: "Your Name",

  background: "https://cdn.discordapp.com/attachments/1495526722240778305/1495527142765760653/IMG_2274_Original.jpg",

  video: "https://cdn.discordapp.com/attachments/1495526722240778305/1495530787120877648/Ryan_Parker.gif",

  links: [
    {
      title: "Instagram",
      url: "https://www.instagram.com/ryanparker2006",
      icon: "https://cdn-icons-png.flaticon.com/512/15713/15713420.png"
    },
    {
      title: "TikTok",
      url: "https://www.tiktok.com/@ryanparker2006",
      icon: "https://cdn-icons-png.flaticon.com/512/3046/3046121.png"
    },
    {
      title: "YouTube",
      url: "https://www.youtube.com/@ryanparker2006",
      icon: "https://cdn-icons-png.flaticon.com/512/15713/15713428.png"
    }
  ]
};
</script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  background: center/cover no-repeat;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* WRAPPER */
.wrapper {
  width: 100%;
  max-width: min(1400px, 95vw);
  display: flex;
  flex-direction: column;
  gap: clamp(16px, 3vw, 28px);
  padding: clamp(16px, 4vw, 40px);
}

/* DESKTOP */
@media (min-width: 900px) {
  .wrapper {
    flex-direction: row;
    justify-content: center;
    align-items: center;
    gap: clamp(40px, 6vw, 120px);
  }

  .left, .right {
    flex: 1;
    max-width: 520px;
  }
}

/* RIGHT STACK */
.right {
  display: flex;
  flex-direction: column;
  gap: clamp(12px, 2vw, 18px);
}

/* THEMES */
body.dark .glass {
  background: rgba(20,20,25,0.5);
  border: 1px solid rgba(255,255,255,0.15);
}

body.light .glass {
  background: rgba(255,255,255,0.25);
  border: 1px solid rgba(255,255,255,0.4);
}

/* GLASS */
.glass {
  backdrop-filter: blur(25px);
  border-radius: 22px;
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,0.2),
    0 10px 40px rgba(0,0,0,0.4);
}

/* CARD */
.card {
  padding: clamp(16px, 2vw, 24px);
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.card h1 {
  color: white;
  text-align: center;
}

/* SWITCH */
.switch {
  display: flex;
  justify-content: center;
}

.switch input {
  display: none;
}

.slider {
  width: 50px;
  height: 26px;
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  position: relative;
}

.slider::before {
  content: "";
  width: 20px;
  height: 20px;
  background: white;
  position: absolute;
  top: 3px;
  left: 3px;
  border-radius: 50%;
  transition: 0.3s;
}

input:checked + .slider::before {
  transform: translateX(24px);
}

/* divider */
hr {
  border: none;
  height: 1px;
  background: rgba(255,255,255,0.3);
}

/* MEDIA */
.video {
  width: 100%;
  aspect-ratio: 16 / 9;
  border-radius: 14px;
  overflow: hidden;
}

.video video,
.video img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* LINKS */
.link {
  display: flex;
  align-items: center;
  padding: 16px;
  border-radius: 20px;
  color: white;
  cursor: pointer;
  transition: 0.25s;
}

.link:hover {
  transform: translateY(-3px);
}

.link img {
  width: 42px;
  height: 42px;
  margin-right: 14px;
  border-radius: 10px;
}

.link span {
  flex: 1;
  font-size: 17px;
}

.arrow {
  font-size: 22px;
  opacity: 0.6;
}
</style>
</head>

<body class="dark">

<div class="wrapper" id="app"></div>

<script>
/* APPLY BACKGROUND */
document.body.style.backgroundImage = `url(${CONFIG.background})`;

/* 🔥 AUTO DETECT GIF OR VIDEO */
const isGif = CONFIG.video.toLowerCase().includes(".gif");

const mediaElement = isGif
  ? `<img src="${CONFIG.video}" />`
  : `<video src="${CONFIG.video}" autoplay muted loop playsinline controls></video>`;

const app = document.getElementById("app");

app.innerHTML = `
  <div class="left">
    <div class="card glass">
      <h1>${CONFIG.name}</h1>

      <label class="switch">
        <input type="checkbox" id="themeToggle">
        <div class="slider"></div>
      </label>

      <hr>

      <div class="video">
        ${mediaElement}
      </div>
    </div>
  </div>

  <div class="right">
    ${CONFIG.links.map(link => `
      <div class="link glass" onclick="window.open('${link.url}', '_blank')">
        <img src="${link.icon}">
        <span>${link.title}</span>
        <div class="arrow">›</div>
      </div>
    `).join("")}
  </div>
`;

/* THEME SWITCH */
const toggle = document.getElementById("themeToggle");

toggle.addEventListener("change", () => {
  document.body.classList.toggle("light", toggle.checked);
  document.body.classList.toggle("dark", !toggle.checked);
});
</script>

</body>
</html>
