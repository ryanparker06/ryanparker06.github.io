<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass UI</title>

<script>
/* =========================
   🔧 CONFIG (EDIT HERE ONLY)
   ========================= */

const CONFIG = {
  name: "Your Name",

  background: "https://images.unsplash.com/photo-1499346030926-9a72daac6c63?q=80&w=1974",

  video: "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1&controls=1&loop=1&playlist=dQw4w9WgXcQ",

  links: [
    {
      title: "Instagram",
      url: "https://instagram.com",
      icon: "https://cdn-icons-png.flaticon.com/512/15713/15713420.png"
    },
    {
      title: "TikTok",
      url: "https://tiktok.com",
      icon: "https://cdn-icons-png.flaticon.com/512/15713/15713417.png"
    },
    {
      title: "YouTube",
      url: "https://youtube.com",
      icon: "https://cdn-icons-png.flaticon.com/512/15713/15713428.png"
    }
  ]
};
</script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  background: center/cover no-repeat;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* blur overlay */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  backdrop-filter: blur(12px);
}

/* 🔥 RESPONSIVE WRAPPER */
.wrapper {
  display: flex;
  flex-direction: column;
  gap: clamp(16px, 3vw, 40px);
  padding: clamp(12px, 3vw, 40px);
}

/* DESKTOP */
@media (min-width: 900px) {
  .wrapper {
    flex-direction: row;
    align-items: center;
    justify-content: center;
  }

  .left,
  .right {
    width: clamp(280px, 25vw, 360px);
  }

  .right {
    display: flex;
    flex-direction: column;
    gap: clamp(12px, 2vw, 24px);
  }
}

/* THEMES */
body.dark .glass {
  background: rgba(20,20,25,0.5);
  border: 1px solid rgba(255,255,255,0.15);
}

body.light .glass {
  background: rgba(255,255,255,0.25);
  border: 1px solid rgba(255,255,255,0.4);
}

/* GLASS */
.glass {
  backdrop-filter: blur(25px);
  border-radius: 22px;
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,0.2),
    0 10px 40px rgba(0,0,0,0.4);
}

/* CARD */
.card {
  padding: 24px;
}

.card h1 {
  color: white;
  text-align: center;
  margin-bottom: 12px;
}

/* SWITCH */
.switch {
  display: flex;
  justify-content: center;
  margin-bottom: 14px;
}

.switch input {
  display: none;
}

.slider {
  width: 50px;
  height: 26px;
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  position: relative;
}

.slider::before {
  content: "";
  width: 20px;
  height: 20px;
  background: white;
  position: absolute;
  top: 3px;
  left: 3px;
  border-radius: 50%;
  transition: 0.3s;
}

input:checked + .slider::before {
  transform: translateX(24px);
}

/* divider */
hr {
  border: none;
  height: 1px;
  background: rgba(255,255,255,0.3);
  margin: 18px 0;
}

/* video */
.video iframe {
  width: 100%;
  height: 180px;
  border-radius: 14px;
}

/* LINKS */
.link {
  display: flex;
  align-items: center;
  padding: 16px;
  border-radius: 20px;
  color: white;
  cursor: pointer;
  transition: 0.25s;
}

.link:hover {
  transform: translateY(-3px);
}

.link img {
  width: 42px;
  height: 42px;
  margin-right: 14px;
  border-radius: 10px;
  object-fit: cover;
}

.link span {
  flex: 1;
  font-size: 17px;
}

.arrow {
  font-size: 22px;
  opacity: 0.6;
}
</style>
</head>

<body class="dark">

<div class="wrapper" id="app"></div>

<script>
/* APPLY BACKGROUND */
document.body.style.backgroundImage = `url(${CONFIG.background})`;

const app = document.getElementById("app");

app.innerHTML = `
  <div class="left">
    <div class="card glass">
      <h1>${CONFIG.name}</h1>

      <label class="switch">
        <input type="checkbox" id="themeToggle">
        <div class="slider"></div>
      </label>

      <hr>

      <div class="video">
        <iframe src="${CONFIG.video}"></iframe>
      </div>
    </div>
  </div>

  <div class="right">
    ${CONFIG.links.map(link => `
      <div class="link glass" onclick="window.open('${link.url}', '_blank')">
        <img src="${link.icon}">
        <span>${link.title}</span>
        <div class="arrow">›</div>
      </div>
    `).join("")}
  </div>
`;

/* THEME SWITCH */
const toggle = document.getElementById("themeToggle");

toggle.addEventListener("change", () => {
  document.body.classList.toggle("light", toggle.checked);
  document.body.classList.toggle("dark", !toggle.checked);
});
</script>

</body>
</html>
