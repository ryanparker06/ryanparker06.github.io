<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass UI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

/* 🔥 CHANGE BACKGROUND HERE */
body {
  --bg-url: url('https://images.unsplash.com/photo-1499346030926-9a72daac6c63?q=80&w=1974');
  background: var(--bg-url) center/cover no-repeat;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.4s;
}

/* blur overlay */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  backdrop-filter: blur(12px);
}

/* container */
.container {
  width: 340px;
  position: relative;
}

/* THEMES */
body.dark .glass {
  background: rgba(20,20,25,0.5);
  border: 1px solid rgba(255,255,255,0.15);
}

body.light .glass {
  background: rgba(255,255,255,0.25);
  border: 1px solid rgba(255,255,255,0.4);
}

/* GLASS */
.glass {
  backdrop-filter: blur(25px);
  border-radius: 22px;
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,0.2),
    0 10px 40px rgba(0,0,0,0.4);
  transition: 0.3s;
}

/* MAIN CARD */
.card {
  padding: 24px;
  margin-bottom: 22px;
}

.card h1 {
  color: white;
  text-align: center;
  margin-bottom: 12px;
}

/* SWITCH */
.switch {
  display: flex;
  justify-content: center;
  margin-bottom: 14px;
}

.switch input {
  display: none;
}

.slider {
  width: 50px;
  height: 26px;
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  position: relative;
  cursor: pointer;
}

.slider::before {
  content: "";
  width: 20px;
  height: 20px;
  background: white;
  position: absolute;
  top: 3px;
  left: 3px;
  border-radius: 6px;
  transition: 0.3s;
}

input:checked + .slider::before {
  transform: translateX(24px);
}

/* divider */
hr {
  border: none;
  height: 1px;
  background: rgba(255,255,255,0.3);
  margin: 18px 0;
}

/* video */
.video iframe {
  width: 100%;
  height: 180px;
  border-radius: 14px;
  border: none;
}

/* LINKS */
.link {
  display: flex;
  align-items: center;
  padding: 16px;
  margin-bottom: 16px;
  border-radius: 20px;
  color: white;
  cursor: pointer;
  transition: 0.25s;
}

.link:hover {
  transform: translateY(-3px);
}

/* 🔥 TRUE SQUARE ICON BOX */
.icon-box {
  width: 42px;
  height: 42px;
  border-radius: 10px;
  background: rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 14px;
  backdrop-filter: blur(10px);
}

/* ICON */
.icon-box img {
  width: 22px;
  height: 22px;
  object-fit: contain;
}

/* text */
.link span {
  flex: 1;
  font-size: 17px;
}

.arrow {
  font-size: 22px;
  opacity: 0.6;
}
</style>
</head>

<body class="dark">

<div class="container">

  <div class="card glass">
    <h1>Your Name</h1>

    <label class="switch">
      <input type="checkbox" id="themeToggle">
      <div class="slider"></div>
    </label>

    <hr>

    <div class="video">
      <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
    </div>
  </div>

  <!-- Instagram -->
  <div class="link glass" onclick="go('https://instagram.com')">
    <div class="icon-box">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
    </div>
    <span>Instagram</span>
    <div class="arrow">›</div>
  </div>

  <!-- TikTok -->
  <div class="link glass" onclick="go('https://tiktok.com')">
    <div class="icon-box">
      <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
    </div>
    <span>TikTok</span>
    <div class="arrow">›</div>
  </div>

  <!-- YouTube -->
  <div class="link glass" onclick="go('https://youtube.com')">
    <div class="icon-box">
      <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
    </div>
    <span>YouTube</span>
    <div class="arrow">›</div>
  </div>

</div>

<script>
function go(url){
  window.open(url, "_blank");
}

/* THEME SWITCH */
const toggle = document.getElementById("themeToggle");

toggle.addEventListener("change", () => {
  if (toggle.checked) {
    document.body.classList.remove("dark");
    document.body.classList.add("light");
  } else {
    document.body.classList.remove("light");
    document.body.classList.add("dark");
  }
});

/* 🔥 CHANGE BACKGROUND WITH JS */
function setBackground(url){
  document.body.style.setProperty('--bg-url', `url(${url})`);
}
</script>

</body>
</html>
