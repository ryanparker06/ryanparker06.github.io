<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Page</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;

  background: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb") no-repeat center/cover;
}

/* Container */
.container {
  width: 95%;
  max-width: 700px;
  padding: 30px;

  border-radius: 20px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);

  border: 1px solid rgba(255,255,255,0.25);
  color: white;
  text-align: center;
}

/* Title */
h1 {
  margin: 0;
}

/* Spacing system */
.section {
  margin: 20px 0;
}

/* Separator */
.separator {
  height: 1px;
  background: rgba(255,255,255,0.3);
}

/* Video */
iframe {
  width: 100%;
  height: 230px;
  border-radius: 12px;
}

/* Button */
.btn-box {
  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 16px;
  margin: 14px 0;

  border-radius: 16px;

  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.25);

  backdrop-filter: blur(10px);

  text-decoration: none;
  color: white;

  position: relative;
  overflow: hidden;

  transition: all 0.2s ease;
}

/* Left side (icon + text) */
.left {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* Icon inside button */
.icon {
  width: 30px;
  height: 30px;
}

/* Text */
.label {
  font-size: 16px;
}

/* Arrow */
.btn-box span {
  transition: transform 0.2s ease;
}

/* Hover */
.btn-box:hover {
  transform: translateY(-4px) scale(1.02);
  background: rgba(0,0,0,0.25);
}

/* Arrow move */
.btn-box:hover span {
  transform: translateX(6px);
}

/* Click */
.btn-box:active {
  transform: scale(0.96);
}

/* Ripple */
.btn-box::after {
  content: "";
  position: absolute;
  width: 0;
  height: 0;
  background: rgba(255,255,255,0.25);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
}

.btn-box:active::after {
  width: 200px;
  height: 200px;
  opacity: 1;
  transition: 0.4s;
}

</style>
</head>

<body>

<div class="container">

  <h1>Your Name</h1>

  <div class="section separator"></div>

  <div class="section">
    <iframe src="https://www.youtube.com/embed/VIDEO_ID" allowfullscreen></iframe>
  </div>

  <div class="section separator"></div>

  <!-- Instagram -->
  <a href="#" class="btn-box">
    <div class="left">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" class="icon">
      <div class="label">Instagram</div>
    </div>
    <span>›</span>
  </a>

  <!-- TikTok -->
  <a href="#" class="btn-box">
    <div class="left">
      <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" class="icon">
      <div class="label">TikTok</div>
    </div>
    <span>›</span>
  </a>

  <!-- YouTube -->
  <a href="#" class="btn-box">
    <div class="left">
      <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" class="icon">
      <div class="label">YouTube</div>
    </div>
    <span>›</span>
  </a>

  <div class="section separator"></div>

</div>

</body>
</html>
