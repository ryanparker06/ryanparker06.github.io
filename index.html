<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryan Parker</title>

<script>
const CONFIG = {
  name: "RYAN PARKER",

  bio: "Parkour/Freerunning • Walking and Hiking",

  sectionTitle: "Social Media Links",

  background: "https://res.cloudinary.com/dbtjqh5j3/image/upload/v1776807364/IMG_0258_xdvogz.heic",

  video: "https://www.youtube.com/watch?v=XwChNNNexjI",

  links: [
    {
      title: "Instagram",
      url: "https://www.instagram.com/ryanparker2006",
      icon: "https://res.cloudinary.com/dbtjqh5j3/image/upload/v1776807288/31_novtxd.png"
    },
    {
      title: "TikTok",
      url: "https://www.tiktok.com/@ryanparker2006",
      icon: "https://res.cloudinary.com/dbtjqh5j3/image/upload/v1776807288/32_dx85rs.png"
    },
    {
      title: "YouTube",
      url: "https://www.youtube.com/@ryanparker2006",
      icon: "https://res.cloudinary.com/dbtjqh5j3/image/upload/v1776807288/33_ropxt7.png"
    }
  ]
};
</script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background: black;
  background-image: var(--bg);
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.wrapper {
  width: 100%;
  max-width: 1100px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  padding: 20px;
  margin: auto;

  opacity: 0;
  transform: translateY(20px);
  animation: buildIn 0.8s ease forwards;
}

@keyframes buildIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (min-width: 900px) {
  .wrapper {
    flex-direction: row;
    justify-content: center;
    align-items: center;
    gap: 60px;
  }

  .left, .right {
    width: 100%;
    max-width: 480px;
  }
}

.right {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.glass {
  backdrop-filter: blur(25px);
  border-radius: 22px;
  background: rgba(20,20,25,0.5);
  border: 1px solid rgba(255,255,255,0.15);
}

.card {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card h1 {
  color: white;
  text-align: center;
}

.bio {
  color: rgba(255,255,255,0.7);
  text-align: center;
  font-size: 14px;
}

.divider {
  width: 100%;
  height: 1px;
  background: rgba(255,255,255,0.25);
  margin: 6px 0;
}

.section-title {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 56px;
  color: white;
  font-weight: 600;
}

.video {
  width: 100%;
  aspect-ratio: 16 / 9;
  border-radius: 14px;
  overflow: hidden;
}

.video video,
.video img,
.video iframe {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border: none;
}

.link {
  display: flex;
  align-items: center;
  padding: 16px;
  border-radius: 20px;
  color: white;
  cursor: pointer;
  transition: all 0.25s ease;
}

.link:hover {
  transform: translateY(-5px) scale(1.02);
  background: rgba(255,255,255,0.1);
}

.link:active {
  transform: scale(0.97);
}

.link img {
  width: 42px;
  height: 42px;
  margin-right: 14px;
  border-radius: 10px;
}

.link span {
  flex: 1;
}

.arrow {
  font-size: 22px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="wrapper" id="app"></div>

<script>
function loadBackground(url) {
  const img = new Image();

  img.onload = () => {
    document.body.style.setProperty('--bg', `url(${url})`);
  };

  img.onerror = () => {
    const retry = url + "&t=" + Date.now();
    document.body.style.setProperty('--bg', `url(${retry})`);
  };

  img.src = url;
}

loadBackground(CONFIG.background);

const videoUrl = CONFIG.video.toLowerCase();

const isGif = videoUrl.includes(".gif");
const isYouTube = videoUrl.includes("youtube.com") || videoUrl.includes("youtu.be");

let mediaElement = "";

if (isGif) {
  mediaElement = `<img src="${CONFIG.video}" />`;
} 
else if (isYouTube) {
  // Latest video from your channel (no autoplay)
  const embedUrl = "https://www.youtube.com/embed?listType=playlist&list=UU08qXnTQhQDZN7UMYESsVVw";

  mediaElement = `
    <iframe 
      src="${embedUrl}" 
      frameborder="0" 
      allow="encrypted-media; picture-in-picture"
      allowfullscreen>
    </iframe>
  `;
} 
else {
  mediaElement = `<video src="${CONFIG.video}" autoplay muted loop playsinline controls></video>`;
}

const app = document.getElementById("app");

app.innerHTML = `
  <div class="left">
    <div class="card glass">
      <h1>${CONFIG.name}</h1>
      <p class="bio">${CONFIG.bio}</p>
      <div class="divider"></div>
      <div class="video">
        ${mediaElement}
      </div>
    </div>
  </div>

  <div class="right">
    <div class="section-title glass">
      ${CONFIG.sectionTitle}
    </div>

    ${CONFIG.links.map(link => `
      <div class="link glass" onclick="window.open('${link.url}', '_blank')">
        <img src="${link.icon}" alt="${link.title}">
        <span>${link.title}</span>
        <div class="arrow">›</div>
      </div>
    `).join("")}
  </div>
`;
</script>

</body>
</html>
