<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryan Parker</title>

<script>
const CONFIG = {
  name: "Ryan Parker",
  sectionTitle: "Social Media Links",

  background: "https://cdn.discordapp.com/attachments/1495526722240778305/1495546898751422615/IMG_0258_Original.jpg?ex=69e6a416&is=69e55296&hm=667e5561555971bf7ed2ff6cc32c81ee759bf416581e6d819a27cece1d343166&",

  video: "https://cdn.discordapp.com/attachments/1495526722240778305/1495530787120877648/Ryan_Parker.gif?ex=69e69515&is=69e54395&hm=574f65649cb20cc160ea6fa153250ef455003f3179f4ab5b2d74ef7ec9aab56e&",

  links: [
    {
      title: "Instagram",
      url: "https://www.instagram.com/ryanparker2006",
      icon: "https://cdn.discordapp.com/attachments/1495526722240778305/1495533229954961598/31.png?ex=69e6975b&is=69e545db&hm=831bcbf92361f47b35c3ccefdeb803634d49787fa22ee7cd0bf1b9c7a48ce1c1&"
    },
    {
      title: "TikTok",
      url: "https://www.tiktok.com/@ryanparker2006",
      icon: "https://cdn.discordapp.com/attachments/1495526722240778305/1495533246962860082/32.png?ex=69e6975f&is=69e545df&hm=4d1d24c6b1b0c13eaae040d69933821a854a3b53ffe7352409285f6f8ed27646&"
    },
    {
      title: "YouTube",
      url: "https://www.youtube.com/@ryanparker2006",
      icon: "https://cdn.discordapp.com/attachments/1495526722240778305/1495533263513452627/33.png?ex=69e69763&is=69e545e3&hm=8ee415ec59526b3f96ad22d1341ea67ed60d75875175402fd775f8b65a66db85&"
    }
  ]
};
</script>

<style>
body {
  margin:0;
  font-family: sans-serif;
  background: black;
  background-image: var(--bg);
  background-size: cover;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.wrapper {
  max-width:1100px;
  width:100%;
  display:flex;
  flex-direction:column;
  gap:20px;
  padding:20px;
}

@media(min-width:900px){
  .wrapper {flex-direction:row; justify-content:center; align-items:center;}
}

.glass {
  backdrop-filter: blur(25px);
  background: rgba(20,20,25,0.5);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:20px;
}

.card {padding:20px; text-align:center; color:white;}

.divider {height:1px;background:rgba(255,255,255,0.3);margin:10px 0;}

.video {aspect-ratio:16/9; overflow:hidden; border-radius:10px;}
.video img {width:100%; height:100%; object-fit:cover;}

.right {display:flex; flex-direction:column; gap:12px;}

.link {display:flex; align-items:center; padding:12px; color:white; cursor:pointer;}
.link img {width:40px; margin-right:10px; border-radius:8px;}
.link span {flex:1;}

.section-title {text-align:center; color:white; padding:10px;}

canvas {
  width:100%;
  height:200px;
  background:rgba(0,0,0,0.3);
  border-radius:10px;
}

/* leaderboard */
.leaderboard {
  color:white;
  font-size:14px;
  text-align:left;
}
</style>
</head>

<body>

<div class="wrapper" id="app"></div>

<script>
document.body.style.setProperty('--bg', `url(${CONFIG.background})`);

const isGif = CONFIG.video.includes(".gif");

const media = isGif
  ? `<img src="${CONFIG.video}">`
  : `<video src="${CONFIG.video}" autoplay muted loop></video>`;

const app = document.getElementById("app");

app.innerHTML = `
<div class="left">
  <div class="card glass">
    <h1>${CONFIG.name}</h1>
    <div class="divider"></div>
    <div class="video">${media}</div>

    <!-- GAME -->
    <h3>🎮 Glass Runner</h3>
    <canvas id="game"></canvas>
    <p>Tap / Space to jump</p>

    <div class="leaderboard" id="leaderboard"></div>
  </div>
</div>

<div class="right">
  <div class="section-title glass">${CONFIG.sectionTitle}</div>

  ${CONFIG.links.map(l=>`
    <div class="link glass" onclick="window.open('${l.url}','_blank')">
      <img src="${l.icon}">
      <span>${l.title}</span>
      <div>›</div>
    </div>
  `).join("")}
</div>
`;

/* GAME LOGIC */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 600;
canvas.height = 200;

let player = {x:50,y:150,w:20,h:20,vy:0};
let gravity = 0.6;
let jumping = false;

let obstacles = [];
let score = 0;
let running = true;

function spawnObstacle(){
  obstacles.push({x:600,y:160,w:20,h:40});
}

setInterval(spawnObstacle,1500);

function update(){
  if(!running) return;

  ctx.clearRect(0,0,600,200);

  player.vy += gravity;
  player.y += player.vy;

  if(player.y > 150){
    player.y = 150;
    player.vy = 0;
    jumping = false;
  }

  ctx.fillStyle="white";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  obstacles.forEach(o=>{
    o.x -= 5;
    ctx.fillRect(o.x,o.y,o.w,o.h);

    // collision
    if(player.x < o.x+o.w &&
       player.x+player.w > o.x &&
       player.y < o.y+o.h &&
       player.y+player.h > o.y){
         gameOver();
    }
  });

  obstacles = obstacles.filter(o=>o.x>-20);

  score++;
  ctx.fillText("Score: "+score,10,20);

  requestAnimationFrame(update);
}

function jump(){
  if(!jumping){
    player.vy = -10;
    jumping = true;
  }
}

document.addEventListener("keydown",e=>{
  if(e.code==="Space") jump();
});

canvas.addEventListener("click", jump);

function gameOver(){
  running = false;
  saveScore(score);
  alert("Game Over! Score: "+score);
}

function saveScore(s){
  let scores = JSON.parse(localStorage.getItem("scores")||"[]");
  scores.push(s);
  scores.sort((a,b)=>b-a);
  scores = scores.slice(0,10);
  localStorage.setItem("scores",JSON.stringify(scores));
  renderLeaderboard();
}

function renderLeaderboard(){
  let scores = JSON.parse(localStorage.getItem("scores")||"[]");
  document.getElementById("leaderboard").innerHTML =
    "<h4>🏆 Top 10</h4>" +
    scores.map((s,i)=>`${i+1}. ${s}`).join("<br>");
}

renderLeaderboard();
update();
</script>

</body>
</html>
