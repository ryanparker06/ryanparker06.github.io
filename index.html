<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass UI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1499346030926-9a72daac6c63?q=80&w=1974') no-repeat center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Container */
.container {
  width: 320px;
}

/* Glass Card */
.card {
  padding: 20px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  text-align: center;
  margin-bottom: 20px;
}

/* Title */
.card h1 {
  color: #fff;
  margin-bottom: 15px;
  font-weight: 600;
}

/* Divider */
hr {
  border: none;
  height: 1px;
  background: rgba(255,255,255,0.2);
  margin: 20px 0;
}

/* Video */
.video iframe {
  width: 100%;
  height: 180px;
  border-radius: 12px;
}

/* Toggle */
.switch {
  position: relative;
  display: inline-block;
  width: 50px;
  height: 25px;
  margin-bottom: 10px;
}

.switch input {
  display: none;
}

.slider {
  position: absolute;
  cursor: pointer;
  background: rgba(255,255,255,0.3);
  border-radius: 25px;
  width: 100%;
  height: 100%;
  transition: 0.3s;
}

.slider:before {
  content: "";
  position: absolute;
  height: 20px;
  width: 20px;
  left: 3px;
  top: 2.5px;
  background: white;
  border-radius: 50%;
  transition: 0.3s;
}

input:checked + .slider {
  background: rgba(255,255,255,0.6);
}

input:checked + .slider:before {
  transform: translateX(24px);
}

/* Link Cards */
.link-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 18px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  color: #fff;
  cursor: pointer;
  transition: 0.2s ease;
}

.link-card:hover {
  transform: translateY(-3px);
  background: rgba(255,255,255,0.15);
}

.link-card img {
  width: 28px;
  height: 28px;
  margin-right: 10px;
}

.link-card span {
  flex: 1;
  font-size: 16px;
}

.arrow {
  font-size: 22px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h1>Your Name</h1>

    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>

    <hr>

    <div class="video">
      <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"
              frameborder="0"
              allowfullscreen>
      </iframe>
    </div>
  </div>

  <div class="link-card" onclick="openLink('https://instagram.com')">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
    <span>Instagram</span>
    <span class="arrow">›</span>
  </div>

  <div class="link-card" onclick="openLink('https://tiktok.com')">
    <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
    <span>TikTok</span>
    <span class="arrow">›</span>
  </div>

  <div class="link-card" onclick="openLink('https://youtube.com')">
    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
    <span>YouTube</span>
    <span class="arrow">›</span>
  </div>

</div>

<script>
function openLink(url) {
  window.open(url, "_blank");
}

// Optional toggle effect (just for demo)
document.getElementById("toggle").addEventListener("change", function() {
  if (this.checked) {
    document.body.style.filter = "brightness(1.2)";
  } else {
    document.body.style.filter = "brightness(1)";
  }
});
</script>

</body>
</html>
