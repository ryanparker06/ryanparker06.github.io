<script>
function startGame(){
  result.innerText = "";
  playAgainBtn.style.display = "none";

  ready = false;
  waiting = true;

  let countdown = 3;

  gameBox.style.background = "rgba(0,0,0,0.35)";
  gameText.innerText = countdown;

  const countdownInterval = setInterval(() => {
    countdown--;

    if(countdown > 0){
      gameText.innerText = countdown;
    } else {
      clearInterval(countdownInterval);

      gameText.innerText = "Wait...";

      // now do the random delay like before
      setTimeout(()=>{
        if(Math.random()<0.3){
          gameBox.style.background="red";
          gameText.innerText="DON'T TAP!";
          ready=false;
        } else {
          gameBox.style.background="lime";
          gameText.innerText="TAP!";
          startTime=Date.now();
          ready=true;
        }
        waiting=false;
      }, Math.random()*2000 + 1000); // slightly shorter delay now
    }

  }, 700); // speed of countdown (feel free to tweak)
}
</script>
