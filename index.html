<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryan Parker</title>

<script>
const CONFIG = {
  name: "Ryan Parker",

  /* 🔥 EDIT THIS TEXT */
  sectionTitle: "Social Media Links",

  background: "https://cdn.discordapp.com/attachments/1495526722240778305/1495546898751422615/IMG_0258_Original.jpg?ex=69e6a416&is=69e55296&hm=667e5561555971bf7ed2ff6cc32c81ee759bf416581e6d819a27cece1d343166&",

  video: "https://cdn.discordapp.com/attachments/1495526722240778305/1495530787120877648/Ryan_Parker.gif?ex=69e69515&is=69e54395&hm=574f65649cb20cc160ea6fa153250ef455003f3179f4ab5b2d74ef7ec9aab56e&",

  links: [
    {
      title: "Instagram",
      url: "https://www.instagram.com/ryanparker2006",
      icon: "https://cdn.discordapp.com/attachments/1495526722240778305/1495533229954961598/31.png?ex=69e6975b&is=69e545db&hm=831bcbf92361f47b35c3ccefdeb803634d49787fa22ee7cd0bf1b9c7a48ce1c1&"
    },
    {
      title: "TikTok",
      url: "https://www.tiktok.com/@ryanparker2006",
      icon: "https://cdn.discordapp.com/attachments/1495526722240778305/1495533246962860082/32.png?ex=69e6975f&is=69e545df&hm=4d1d24c6b1b0c13eaae040d69933821a854a3b53ffe7352409285f6f8ed27646&"
    },
    {
      title: "YouTube",
      url: "https://www.youtube.com/@ryanparker2006",
      icon: "https://cdn.discordapp.com/attachments/1495526722240778305/1495533263513452627/33.png?ex=69e69763&is=69e545e3&hm=8ee415ec59526b3f96ad22d1341ea67ed60d75875175402fd775f8b65a66db85&"
    }
  ]
};
</script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  will-change: transform, opacity;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background-image: var(--bg);
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* transitions */
body,
.glass,
.link,
.section-title {
  transition: 0.4s ease;
}

/* wrapper */
.wrapper {
  width: 100%;
  max-width: min(1400px, 95vw);
  display: flex;
  flex-direction: column;
  gap: clamp(16px, 3vw, 28px);
  padding: clamp(16px, 4vw, 40px);

  opacity: 0;
  filter: blur(10px);
  transform: translateY(30px) scale(0.98);
  animation: appLoad 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

@keyframes appLoad {
  to {
    opacity: 1;
    filter: blur(0);
    transform: translateY(0) scale(1);
  }
}

/* stagger */
.left,
.section-title,
.link {
  opacity: 0;
  transform: translateY(20px);
  animation: itemFade 0.6s ease forwards;
}

.left { animation-delay: 0.2s; }
.section-title { animation-delay: 0.4s; }
.link:nth-child(2) { animation-delay: 0.5s; }
.link:nth-child(3) { animation-delay: 0.6s; }
.link:nth-child(4) { animation-delay: 0.7s; }

@keyframes itemFade {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* desktop */
@media (min-width: 900px) {
  .wrapper {
    flex-direction: row;
    gap: clamp(40px, 6vw, 120px);
  }

  .left, .right {
    flex: 1;
    max-width: 520px;
  }
}

/* right */
.right {
  display: flex;
  flex-direction: column;
  gap: clamp(12px, 2vw, 18px);
}

/* 🔥 NEW TITLE CONTAINER */
.section-title {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 56px;
  border-radius: 20px;
  color: white;
  font-weight: 600;
}

/* themes */
body.dark .glass {
  background: rgba(20,20,25,0.5);
  border: 1px solid rgba(255,255,255,0.15);
}

body.light .glass {
  background: rgba(255,255,255,0.25);
  border: 1px solid rgba(255,255,255,0.4);
}

/* glass */
.glass {
  backdrop-filter: blur(25px);
  border-radius: 22px;
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,0.2),
    0 10px 40px rgba(0,0,0,0.4);
}

/* card */
.card {
  padding: clamp(16px, 2vw, 24px);
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.card h1 {
  color: white;
  text-align: center;
}

/* switch */
.switch {
  display: flex;
  justify-content: center;
}

.switch input {
  display: none;
}

.slider {
  width: 50px;
  height: 26px;
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  position: relative;
}

.slider::before {
  content: "";
  width: 20px;
  height: 20px;
  background: white;
  position: absolute;
  top: 3px;
  left: 3px;
  border-radius: 50%;
  transition: 0.3s;
}

input:checked + .slider::before {
  transform: translateX(24px);
}

/* media */
.video {
  width: 100%;
  aspect-ratio: 16 / 9;
  border-radius: 14px;
  overflow: hidden;
}

.video video,
.video img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* links */
.link {
  display: flex;
  align-items: center;
  padding: 16px;
  border-radius: 20px;
  color: white;
  cursor: pointer;
}

.link img {
  width: 42px;
  height: 42px;
  margin-right: 14px;
  border-radius: 10px;
}

.link span {
  flex: 1;
}

.arrow {
  font-size: 22px;
  opacity: 0.6;
}
</style>
</head>

<body class="dark">

<div class="wrapper" id="app"></div>

<script>
/* background fix */
document.body.style.setProperty('--bg', `url(${CONFIG.background})`);

/* media */
const isGif = CONFIG.video.toLowerCase().includes(".gif");

const mediaElement = isGif
  ? `<img src="${CONFIG.video}" />`
  : `<video src="${CONFIG.video}" autoplay muted loop playsinline controls></video>`;

const app = document.getElementById("app");

app.innerHTML = `
  <div class="left">
    <div class="card glass">
      <h1>${CONFIG.name}</h1>

      <label class="switch">
        <input type="checkbox" id="themeToggle">
        <div class="slider"></div>
      </label>

      <div class="video">
        ${mediaElement}
      </div>
    </div>
  </div>

  <div class="right">

    <!-- 🔥 NEW CONTAINER -->
    <div class="section-title glass">
      ${CONFIG.sectionTitle}
    </div>

    ${CONFIG.links.map(link => `
      <div class="link glass" onclick="window.open('${link.url}', '_blank')">
        <img src="${link.icon}">
        <span>${link.title}</span>
        <div class="arrow">›</div>
      </div>
    `).join("")}

  </div>
`;

/* theme */
const toggle = document.getElementById("themeToggle");

toggle.addEventListener("change", () => {
  document.body.classList.toggle("light", toggle.checked);
  document.body.classList.toggle("dark", !toggle.checked);
});
</script>

</body>
</html>
