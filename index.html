<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Page</title>

<style>
* {
  box-sizing: border-box;
}

/* ------------------ */
/* THEME */
/* ------------------ */
:root {
  --bg-overlay: rgba(255,255,255,0.08);
  --text: white;
  --border: rgba(255,255,255,0.25);
  --btn-bg: rgba(255,255,255,0.06);
}

body.light {
  --bg-overlay: rgba(0,0,0,0.45);
  --text: white;
  --border: rgba(255,255,255,0.15);
  --btn-bg: rgba(0,0,0,0.35);
}

/* Smooth transitions */
body, .container, .btn-box {
  transition: background 0.3s ease, color 0.3s ease, border 0.3s ease;
}

/* ------------------ */
/* BODY */
/* ------------------ */
body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, sans-serif;
  color: var(--text);

  display: flex;
  justify-content: center;
  align-items: center;

  background: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb") no-repeat center/cover;
}

/* ------------------ */
/* CONTAINER */
/* ------------------ */
.container {
  width: 92%;
  max-width: 900px;
  padding: 30px;
  border-radius: 22px;

  background: var(--bg-overlay);
  backdrop-filter: blur(14px);

  border: 1px solid var(--border);
  text-align: center;

  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.8s ease forwards;
}

/* ------------------ */
/* TITLE */
/* ------------------ */
h1 {
  margin: 0;
  font-size: 28px;
  animation: fadeUp 0.8s ease forwards;
}

/* ------------------ */
/* SWITCH */
/* ------------------ */
.switch {
  margin: 15px auto 0;
  width: 50px;
  height: 26px;
  background: rgba(255,255,255,0.3);
  border-radius: 50px;
  position: relative;
  cursor: pointer;
  transition: 0.3s;
}

.switch::before {
  content: "";
  position: absolute;
  width: 20px;
  height: 20px;
  background: white;
  border-radius: 50%;
  top: 3px;
  left: 4px;
  transition: 0.3s;
}

/* Active state */
body.light .switch {
  background: rgba(0,0,0,0.6);
}

body.light .switch::before {
  transform: translateX(24px);
}

/* ------------------ */
/* GRID */
/* ------------------ */
.grid {
  margin-top: 25px;
}

/* Desktop */
@media (min-width: 850px) {
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
    text-align: left;
  }
}

/* ------------------ */
/* VIDEO */
/* ------------------ */
iframe {
  width: 100%;
  height: 280px;
  border-radius: 14px;

  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.9s ease forwards;
  animation-delay: 0.2s;
}

/* ------------------ */
/* BUTTON */
/* ------------------ */
.btn-box {
  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 16px;
  margin: 12px 0;

  border-radius: 16px;

  background: var(--btn-bg);
  border: 1px solid var(--border);

  text-decoration: none;
  color: var(--text);

  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.6s ease forwards;
}

/* Stagger animation */
.btn-box:nth-child(1) { animation-delay: 0.2s; }
.btn-box:nth-child(2) { animation-delay: 0.3s; }
.btn-box:nth-child(3) { animation-delay: 0.4s; }

/* Left */
.left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.icon {
  width: 30px;
  height: 30px;
}

.label {
  font-size: 16px;
}

/* Hover desktop only */
@media (hover: hover) {
  .btn-box:hover {
    transform: translateY(-4px);
  }

  .btn-box span {
    transition: 0.2s;
  }

  .btn-box:hover span {
    transform: translateX(6px);
  }
}

/* ---------------------- */
/* 📱 MOBILE */
/* ---------------------- */
@media (max-width: 600px) {

  body {
    align-items: flex-start;
    padding: 20px 10px;
  }

  .container {
    padding: 20px;
    border-radius: 18px;
  }

  h1 {
    font-size: 22px;
  }

  .grid {
    display: flex;
    flex-direction: column;
  }

  .video {
    order: 1;
  }

  .links {
    order: 2;
  }

  iframe {
    height: 200px;
  }

  .btn-box {
    padding: 18px;
  }

  .label {
    font-size: 17px;
  }
}

/* ------------------ */
/* ANIMATION */
/* ------------------ */
@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</style>
</head>

<body>

<div class="container">

  <h1>Your Name</h1>

  <!-- SWITCH -->
  <div class="switch" onclick="toggleTheme()"></div>

  <div class="grid">

    <!-- LINKS -->
    <div class="links">

      <a href="#" class="btn-box">
        <div class="left">
          <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" class="icon">
          <div class="label">Instagram</div>
        </div>
        <span>›</span>
      </a>

      <a href="#" class="btn-box">
        <div class="left">
          <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" class="icon">
          <div class="label">TikTok</div>
        </div>
        <span>›</span>
      </a>

      <a href="#" class="btn-box">
        <div class="left">
          <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" class="icon">
          <div class="label">YouTube</div>
        </div>
        <span>›</span>
      </a>

    </div>

    <!-- VIDEO -->
    <div class="video">
      <iframe src="https://www.youtube.com/embed/VIDEO_ID" allowfullscreen></iframe>
    </div>

  </div>

</div>

<script>
function toggleTheme() {
  document.body.classList.toggle("light");

  if (document.body.classList.contains("light")) {
    localStorage.setItem("theme", "dark");
  } else {
    localStorage.setItem("theme", "light");
  }
}

// Load saved theme
if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("light");
}
</script>

</body>
</html>
