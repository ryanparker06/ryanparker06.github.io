<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass UI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at 70% 30%, #2a2f4a, #0f111a 70%);
  overflow: hidden;
}

/* subtle background glow blobs */
body::before, body::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  filter: blur(120px);
  opacity: 0.4;
}
body::before {
  background: #5a6cff;
  top: 10%;
  left: 10%;
}
body::after {
  background: #ff9966;
  bottom: 10%;
  right: 10%;
}

/* container */
.container {
  width: 340px;
}

/* GLASS BASE */
.glass {
  backdrop-filter: blur(25px) saturate(140%);
  -webkit-backdrop-filter: blur(25px) saturate(140%);
  background: rgba(255,255,255,0.06);
  border-radius: 22px;
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,0.15),
    0 10px 40px rgba(0,0,0,0.5);
}

/* MAIN CARD */
.card {
  padding: 24px;
  margin-bottom: 22px;
  position: relative;
}

.card::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 22px;
  pointer-events: none;
  box-shadow:
    inset 0 0 30px rgba(255,255,255,0.08),
    0 0 20px rgba(255,255,255,0.05);
}

/* TITLE */
.card h1 {
  color: #fff;
  font-size: 22px;
  font-weight: 600;
  text-align: center;
  margin-bottom: 14px;
}

/* TOGGLE */
.switch {
  display: flex;
  justify-content: center;
  margin-bottom: 14px;
}

.switch input {
  display: none;
}

.slider {
  width: 48px;
  height: 26px;
  background: rgba(255,255,255,0.15);
  border-radius: 20px;
  position: relative;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.4);
}

.slider::before {
  content: "";
  width: 20px;
  height: 20px;
  background: #fff;
  position: absolute;
  top: 3px;
  left: 3px;
  border-radius: 50%;
  transition: 0.3s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}

input:checked + .slider {
  background: rgba(255,255,255,0.35);
}

input:checked + .slider::before {
  transform: translateX(22px);
}

/* DIVIDER */
hr {
  border: none;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
  margin: 18px 0;
}

/* VIDEO */
.video iframe {
  width: 100%;
  height: 180px;
  border-radius: 14px;
  border: none;
}

/* LINK CARDS */
.link {
  display: flex;
  align-items: center;
  padding: 16px;
  margin-bottom: 16px;
  border-radius: 20px;
  color: #fff;
  position: relative;
  cursor: pointer;
  transition: 0.25s;
}

.link:hover {
  transform: translateY(-4px);
  background: rgba(255,255,255,0.1);
}

/* glow edge */
.link::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 20px;
  box-shadow:
    inset 0 0 20px rgba(255,255,255,0.08),
    0 0 12px rgba(255,255,255,0.05);
  pointer-events: none;
}

.link img {
  width: 30px;
  margin-right: 14px;
}

.link span {
  flex: 1;
  font-size: 17px;
  font-weight: 500;
}

.arrow {
  font-size: 22px;
  opacity: 0.6;
}

</style>
</head>

<body>

<div class="container">

  <div class="card glass">
    <h1>Your Name</h1>

    <label class="switch">
      <input type="checkbox" id="toggle">
      <div class="slider"></div>
    </label>

    <hr>

    <div class="video">
      <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
    </div>
  </div>

  <div class="link glass" onclick="go('https://instagram.com')">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
    <span>Instagram</span>
    <div class="arrow">›</div>
  </div>

  <div class="link glass" onclick="go('https://tiktok.com')">
    <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
    <span>TikTok</span>
    <div class="arrow">›</div>
  </div>

  <div class="link glass" onclick="go('https://youtube.com')">
    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
    <span>YouTube</span>
    <div class="arrow">›</div>
  </div>

</div>

<script>
function go(url){
  window.open(url, "_blank");
}
</script>

</body>
</html>
