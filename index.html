<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Page</title>

<style>
* { box-sizing: border-box; }

:root {
  --glass: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.25);
  --text: #fff;
}

/* ------------------ */
/* BACKGROUND */
/* ------------------ */
body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, sans-serif;
  color: var(--text);

  display: flex;
  justify-content: center;
  align-items: center;

  background: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb") center/cover no-repeat;
}

/* blur + glow layer */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  backdrop-filter: blur(25px);
  background:
    radial-gradient(circle at 50% 30%, rgba(255,255,255,0.15), transparent 60%),
    radial-gradient(circle at 80% 80%, rgba(255,150,50,0.2), transparent 60%);
}

/* ------------------ */
/* WRAPPER */
/* ------------------ */
.wrapper {
  width: 92%;
  max-width: 720px;
}

/* ------------------ */
/* GLASS CARD */
/* ------------------ */
.card {
  position: relative;
  padding: 30px;
  border-radius: 26px;

  background: var(--glass);
  backdrop-filter: blur(18px);

  border: 1px solid var(--border);

  box-shadow:
    0 10px 40px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.25);

  text-align: center;
}

/* glow edge */
.card::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  box-shadow: inset 0 0 25px rgba(255,255,255,0.15);
}

.card + .card {
  margin-top: 25px;
}

/* ------------------ */
/* TITLE */
/* ------------------ */
h1 {
  margin: 0;
  font-size: 30px;
  font-weight: 600;
}

/* ------------------ */
/* SWITCH */
/* ------------------ */
.switch {
  margin: 18px auto;
  width: 54px;
  height: 28px;
  background: rgba(255,255,255,0.25);
  border-radius: 50px;
  position: relative;
  cursor: pointer;
}

.switch::before {
  content: "";
  position: absolute;
  width: 22px;
  height: 22px;
  background: #fff;
  border-radius: 50%;
  top: 3px;
  left: 4px;
  transition: .3s;
}

body.light .switch::before {
  transform: translateX(26px);
}

/* ------------------ */
/* SEPARATOR */
/* ------------------ */
.separator {
  height: 2px;
  margin: 15px 0;
  border-radius: 2px;

  background: linear-gradient(
    to right,
    transparent,
    rgba(255,255,255,0.5),
    transparent
  );
}

/* ------------------ */
/* VIDEO */
/* ------------------ */
.video-wrapper {
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 12px 30px rgba(0,0,0,0.6);
}

iframe {
  width: 100%;
  height: 260px;
  border: none;
  display: block;
}

/* ------------------ */
/* BUTTON */
/* ------------------ */
.btn-box {
  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 18px;
  margin: 14px 0;

  border-radius: 18px;

  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);

  box-shadow:
    0 8px 25px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,255,255,0.2);

  text-decoration: none;
  color: white;
}

/* LEFT */
.left {
  display: flex;
  align-items: center;
  gap: 14px;
}

/* ICON BOX */
.icon-box {
  width: 48px;
  height: 48px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;

  position: relative;
}

/* ICON */
.icon {
  width: 24px;
  z-index: 2;
}

/* BRAND COLORS */
.instagram {
  background: linear-gradient(45deg,#f58529,#dd2a7b,#8134af);
}

.tiktok {
  background: #0f0f0f;
}

.youtube {
  background: linear-gradient(180deg,#ff3d3d,#c40000);
}

/* GLOW */
.icon-box::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  filter: blur(14px);
  opacity: 0.5;
}

.instagram::after { background: #dd2a7b; }
.tiktok::after { background: #00f2ea; }
.youtube::after { background: #ff0000; }

/* TEXT */
.label {
  font-size: 18px;
  font-weight: 500;
}

/* ARROW */
.arrow {
  font-size: 22px;
  opacity: 0.6;
}

/* CLICK */
.btn-box:active {
  transform: scale(0.97);
}

/* ------------------ */
/* MOBILE */
/* ------------------ */
@media (max-width:600px){
  body {
    align-items: flex-start;
    padding: 20px 10px;
  }

  iframe {
    height: 200px;
  }
}

</style>
</head>

<body>

<div class="wrapper">

  <!-- TOP CARD -->
  <div class="card">

    <h1>Your Name</h1>

    <div class="switch"></div>

    <div class="separator"></div>

    <div class="video-wrapper">
      <iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
    </div>

  </div>

  <!-- BUTTON CARD -->
  <div class="card">

    <a href="#" class="btn-box">
      <div class="left">
        <div class="icon-box instagram">
          <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" class="icon">
        </div>
        <div class="label">Instagram</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <a href="#" class="btn-box">
      <div class="left">
        <div class="icon-box tiktok">
          <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" class="icon">
        </div>
        <div class="label">TikTok</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <a href="#" class="btn-box">
      <div class="left">
        <div class="icon-box youtube">
          <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" class="icon">
        </div>
        <div class="label">YouTube</div>
      </div>
      <div class="arrow">›</div>
    </a>

  </div>

</div>

</body>
</html>
