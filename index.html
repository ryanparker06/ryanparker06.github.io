<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Page</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;

  background: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb") no-repeat center/cover;
}

/* Container */
.container {
  width: 95%;
  max-width: 700px;
  padding: 30px;

  border-radius: 20px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);

  border: 1px solid rgba(255,255,255,0.25);
  color: white;
  text-align: center;
}

/* Title */
h1 {
  margin: 0;
}

/* Spacing system */
.section {
  margin: 20px 0;
}

/* Separator */
.separator {
  height: 1px;
  background: rgba(255,255,255,0.3);
}

/* Video */
iframe {
  width: 100%;
  height: 230px;
  border-radius: 12px;
}

/* ROW (icon + button) */
.row {
  display: flex;
  align-items: center;
  margin: 14px 0;
}

/* Icon (NOT clickable) */
.icon {
  width: 34px;
  height: 34px;
  margin-right: 12px;
}

/* Button box */
.btn-box {
  flex: 1;

  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 16px;
  border-radius: 16px;

  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.25);

  backdrop-filter: blur(10px);

  text-decoration: none;
  color: white;

  position: relative;
  overflow: hidden;

  transition: all 0.2s ease;
}

/* Text */
.label {
  flex: 1;
  text-align: center;
}

/* Arrow */
.btn-box span {
  transition: transform 0.2s ease;
}

/* Hover */
.btn-box:hover {
  transform: translateY(-4px) scale(1.02);
  background: rgba(0,0,0,0.25);
}

/* Arrow move */
.btn-box:hover span {
  transform: translateX(6px);
}

/* Click */
.btn-box:active {
  transform: scale(0.96);
}

/* Ripple */
.btn-box::after {
  content: "";
  position: absolute;
  width: 0;
  height: 0;
  background: rgba(255,255,255,0.25);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
}

.btn-box:active::after {
  width: 200px;
  height: 200px;
  opacity: 1;
  transition: 0.4s;
}

</style>
</head>

<body>

<div class="container">

  <h1>Your Name</h1>

  <div class="section separator"></div>

  <div class="section">
    <iframe src="https://www.youtube.com/embed/VIDEO_ID" allowfullscreen></iframe>
  </div>

  <div class="section separator"></div>

  <!-- Instagram -->
  <div class="row">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" class="icon">
    <a href="#" class="btn-box">
      <div class="label">Instagram</div>
      <span>›</span>
    </a>
  </div>

  <!-- TikTok -->
  <div class="row">
    <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" class="icon">
    <a href="#" class="btn-box">
      <div class="label">TikTok</div>
      <span>›</span>
    </a>
  </div>

  <!-- YouTube -->
  <div class="row">
    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" class="icon">
    <a href="#" class="btn-box">
      <div class="label">YouTube</div>
      <span>›</span>
    </a>
  </div>

  <div class="section separator"></div>

</div>

</body>
</html>
